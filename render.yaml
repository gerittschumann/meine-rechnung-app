services:
  - type: web
    name: meine-rechnung-app
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    pythonVersion: "3.10.13"
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
